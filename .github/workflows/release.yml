name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v, for example 1.0.1"
        required: true
        type: string
      draft:
        description: "Create GitHub Release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  velopack-release:
    name: Build and publish Velopack release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install -g vpk
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Version must look like 1.0.1 or 1.0.1-beta. Got: $version"
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build, pack and publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $args = @(
            "-Version", $env:RELEASE_VERSION,
            "-SelfContained",
            "-PublishGitHub",
            "-GitHubRepo", "${{ github.repository }}"
          )

          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.draft }}" -eq "true") {
            $args += "-Draft"
          }

          ./release.ps1 @args

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SerpiumVPN-${{ env.RELEASE_VERSION }}-velopack
          path: publish/releases/*
          if-no-files-found: error
